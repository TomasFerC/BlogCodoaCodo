<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de Consultas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Slabo+27px&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./css/contact.css">
  <link rel="stylesheet" href="./css/index.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
</head>

<body>
  <header></header>
  <div class="imagen"></div>
  <div class="contenedor">
    <div class="box registro">
      <h1>Necesitas Ayuda</h1>
      <h4>Nuestro equipo de pondra en contacto</h4>
      <form action="" class="formulario" id="formulario" name="formulario" accept-charset="utf-8">
        <div class="contenerdorInputs">
          <label><span>Nombre</span><input name="nombre" id="nombreUsuario" type="text" placeholder="Nombre" /></label>
          <label><span>Email</span><input name="email" id="emailUsuario" type="email" placeholder="Email" /></label>
          <label><span>Mensaje</span><input name="mensaje" id="mensajeUsuario" type="text"
              placeholder="Mensaje"></text></label>


          <div class="operacion">
            <input type="radio" name="operacion" id="alquiler" value="alquiler">
            <label for="alquiler" class="label-radio alquiler">Alquiler</label>
            <input type="radio" name="operacion" id="ventas" value="ventas">
            <label for="ventas" class="label-radio ventas">Ventas</label>

          </div>


          <div class="terminos">
            <input type="checkbox" name="terminos" id="terminos">
            <label for="">Acepto Terminos y Condiciones</label>
          </div>

          <ul class="error" id="error">

          </ul>

        </div>
        <input name="enviar" class="boton" id="enviar" type="submit" value="Enviar" />
      </form>
    </div>

    <div class="box mapa">
      <h1>Nuestros Datos</h1>
      <h4>Ubicación de las Oficinas</h4>
      <div class="mapouter">
        <div class="gmap_canvas"><iframe width="468" height="560" id="gmap_canvas"
            src="https://maps.google.com/maps?q=Sunchales+Patria+452&t=&z=13&ie=UTF8&iwloc=&output=embed"
            frameborder="0" scrolling="no" marginheight="0" marginwidth="0"></iframe>

        </div>
      </div>
    </div>
  </div>
  <footer></footer>
</body>
<script src="/js/script.js"></script>
<script src="/js/contact.js"></script>

</html>
