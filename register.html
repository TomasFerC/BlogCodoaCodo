<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Slabo+27px&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="./css/register.css">
    <link rel="stylesheet" href="./css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <title>Formulario de Registro e Inicio de Sesión</title>
</head>

<body>
    <div class="principal">
        <header></header>
        <div class="imagen"></div>
        <div class="container">
            <div class="informacion">
                <div class="info-pequena">
                    <h2>Bienvenido</h2>
                    <p>Para conectarte en nuestra página, por favor, Inicia Sesión</p>
                    <input type="button" value="Iniciar Sesión">
                </div>
            </div>
            <div class="form-informacion">
                <div class="form-informacion-pequena">
                    <h2>Crear una Cuenta</h2>
                    <div class="icons">
                        <i class='bx bxl-google'></i>
                        <i class='bx bxl-facebook-circle'></i>
                        <i class='bx bxl-gmail'></i>
                    </div>
                    <p>o ingresa tu mail para registrarte</p>
                    <form class="form">
                        <label>
                            <i class='bx bx-user'></i>
                            <input type="text" placeholder="Nombre completo">
                        </label>
                        <label>
                            <i class='bx bx-envelope'></i>
                            <input type="email" placeholder="Correo Electrónico">
                        </label>
                        <label>
                            <i class='bx bx-lock-alt'></i>
                            <input type="password" placeholder="Contraseña">
                        </label>
                        <input type="submit" value="Registrarse">
                    </form>
                </div>
            </div>
        </div>
        <footer></footer>
    </div>
    <script src="/js/script.js"></script>
</body>

</html>
